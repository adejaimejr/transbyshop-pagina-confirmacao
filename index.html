<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Pagamento Recebido — TransbyShop</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --brand:      #570d32;
      --brand-mid:  #6e1040;
      --orange:     #e15b2d;
      --red:        #e53842;
      --green:      #2ecc7a;
      --green-glow: rgba(46,204,122,.25);
      --white:      #ffffff;
      --white-80:   rgba(255,255,255,.8);
      --white-50:   rgba(255,255,255,.5);
      --white-20:   rgba(255,255,255,.2);
      --white-10:   rgba(255,255,255,.1);
      --white-06:   rgba(255,255,255,.06);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
      font-family: 'Montserrat', sans-serif;
      background: var(--brand);
      color: var(--white);
    }

    /* ── Full-screen page ── */
    .page {
      height: 100dvh;
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: env(safe-area-inset-top, 0) 0 env(safe-area-inset-bottom, 0);
      position: relative;
      overflow: hidden;
    }

    /* ── Background layers ── */
    .bg-gradient {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 120% 60% at 50% 100%, rgba(225,91,45,.35) 0%, transparent 65%),
        radial-gradient(ellipse 80% 40% at 100% 0%, rgba(229,56,66,.2) 0%, transparent 55%),
        linear-gradient(160deg, #570d32 0%, #3d0920 100%);
      z-index: 0;
    }

    /* decorative arcs */
    .arc {
      position: absolute;
      border-radius: 50%;
      border: 1px solid var(--white-10);
      z-index: 0;
      pointer-events: none;
    }
    .arc-1 { width: 500px; height: 500px; bottom: -220px; left: -120px; }
    .arc-2 { width: 320px; height: 320px; top: -80px; right: -100px; border-color: var(--white-06); }
    .arc-3 { width: 180px; height: 180px; top: 40px; right: 20px; border-color: rgba(225,91,45,.2); }

    /* ── Top section: logo ── */
    .top {
      position: relative;
      z-index: 2;
      padding: clamp(2rem, 8vw, 3.5rem) 2rem 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
      opacity: 0;
      animation: fade-down .55s ease .05s forwards;
    }

    .logo-svg {
      height: 20px;
      width: auto;
      filter: brightness(0) invert(1);
      opacity: .9;
    }

    /* ── Middle section: main content ── */
    .middle {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      padding: 0 2rem;
      flex: 1;
      justify-content: center;
      gap: 0;
    }

    /* Check circle */
    .check-ring-outer {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      background: var(--green-glow);
      border: 2px solid rgba(46,204,122,.3);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 2rem;
      position: relative;
      opacity: 0;
      animation: pop .55s cubic-bezier(.34,1.56,.64,1) .4s forwards;
    }

    .check-ring-outer::before {
      content: '';
      position: absolute;
      inset: -14px;
      border-radius: 50%;
      border: 1.5px solid rgba(46,204,122,.18);
      animation: ripple 2.8s ease-out 1.2s infinite;
    }
    .check-ring-outer::after {
      content: '';
      position: absolute;
      inset: -28px;
      border-radius: 50%;
      border: 1px solid rgba(46,204,122,.08);
      animation: ripple 2.8s ease-out 1.5s infinite;
    }

    .check-ring-inner {
      width: 90px;
      height: 90px;
      border-radius: 50%;
      background: rgba(46,204,122,.15);
      border: 2px solid rgba(46,204,122,.5);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .check-svg {
      width: 42px; height: 42px;
      fill: none;
      stroke: var(--green);
      stroke-width: 2.8;
      stroke-linecap: round;
      stroke-linejoin: round;
      filter: drop-shadow(0 0 8px rgba(46,204,122,.6));
    }

    .check-path {
      stroke-dasharray: 50;
      stroke-dashoffset: 50;
      animation: draw .45s ease-out 1s forwards;
    }

    /* Tag */
    .tag {
      font-size: .6rem;
      font-weight: 600;
      letter-spacing: .22em;
      text-transform: uppercase;
      color: var(--green);
      margin-bottom: .85rem;
      opacity: 0;
      animation: fade-up .4s ease .65s forwards;
    }

    /* Headline */
    h1 {
      font-size: clamp(1.75rem, 7vw, 2.4rem);
      font-weight: 700;
      line-height: 1.15;
      color: var(--white);
      margin-bottom: 1rem;
      letter-spacing: -.01em;
      opacity: 0;
      animation: fade-up .4s ease .75s forwards;
    }

    h1 span {
      display: block;
      font-weight: 300;
      font-size: .75em;
      opacity: .7;
      letter-spacing: .01em;
    }

    /* Subtitle */
    .subtitle {
      font-size: .82rem;
      font-weight: 300;
      line-height: 1.7;
      color: var(--white-80);
      max-width: 300px;
      margin-bottom: 2.5rem;
      opacity: 0;
      animation: fade-up .4s ease .85s forwards;
    }

    /* Status pill */
    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: .5rem;
      background: rgba(46,204,122,.15);
      border: 1.5px solid rgba(46,204,122,.35);
      border-radius: 100px;
      padding: .55rem 1.25rem;
      opacity: 0;
      animation: fade-up .4s ease .95s forwards;
    }

    .status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: var(--green);
      box-shadow: 0 0 8px var(--green);
      animation: blink 2s ease-in-out 1.5s infinite;
    }

    .status-text {
      font-size: .75rem;
      font-weight: 600;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: var(--green);
    }

    /* ── Bottom section ── */
    .bottom {
      position: relative;
      z-index: 2;
      width: 100%;
      padding: 0 1.5rem clamp(2rem, 8vw, 3.5rem);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.25rem;
      opacity: 0;
      animation: fade-up .5s ease 1.1s forwards;
    }

    /* divider line */
    .bottom-line {
      width: 40px;
      height: 1px;
      background: var(--white-20);
    }

    /* Brand tagline */
    .brand-line {
      font-size: .68rem;
      font-weight: 400;
      letter-spacing: .14em;
      text-transform: uppercase;
      color: var(--white-50);
    }

    /* Gradient separator bar at bottom */
    .bottom-bar {
      width: 60px;
      height: 3px;
      border-radius: 2px;
      background: linear-gradient(90deg, var(--orange), var(--red));
    }

    /* ── Animations ── */
    @keyframes fade-down  { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fade-up    { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes pop        { 0% { opacity:0; transform:scale(.5); } to { opacity:1; transform:scale(1); } }
    @keyframes draw       { to { stroke-dashoffset:0; } }
    @keyframes ripple     { 0% { transform:scale(1); opacity:.6; } 100% { transform:scale(1.35); opacity:0; } }
    @keyframes blink      { 0%,100% { opacity:1; } 50% { opacity:.2; } }

    /* ── Desktop fallback: centered card look ── */
    @media (min-width: 600px) {
      body { background: #1a0812; }
      .page {
        background: var(--brand);
        max-width: 420px;
        margin: 0 auto;
        height: 100dvh;
        box-shadow: 0 0 80px rgba(0,0,0,.5);
      }
    }
  </style>
</head>
